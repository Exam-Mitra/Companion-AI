name: Unzip File

on:
  workflow_dispatch:
    inputs:
      zip_path:
        description: 'Path to the zip file (relative to repo root)'
        required: true
        default: 'ai-companion.zip'
      extract_to:
        description: 'Destination folder for extraction (use "." for same directory)'
        required: true
        default: '.'

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip the file
        run: |
          echo "Unzipping ${{ github.event.inputs.zip_path }} to ${{ github.event.inputs.extract_to }}"
          mkdir -p "${{ github.event.inputs.extract_to }}"
          unzip -o "${{ github.event.inputs.zip_path }}" -d "${{ github.event.inputs.extract_to }}"

      - name: List extracted contents
        run: |
          echo "Contents of ${{ github.event.inputs.extract_to }}:"
          ls -la "${{ github.event.inputs.extract_to }}"

      # Optional: Add your build steps here
      # - name: Run build
      #   run: |
      #     echo "Add your build commands here"
      #     # e.g., npm install && npm run build
      #     # or ./gradlew build (for Android projects)

      - name: Upload extracted files as artifact (optional)
        uses: actions/upload-artifact@v4
        with:
          name: extracted-files
          path: ${{ github.event.inputs.extract_to }}/**/*
          if-no-files-found: warn
          retention-days: 7
